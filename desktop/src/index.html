<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mercari 桌面控制台</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div id="app" class="app">
      <header class="topbar">
        <div class="topbar-main">
          <div class="info drag-zone">
            <div class="drag-icon" id="drag-icon">⋮⋮</div>
            <div class="title-wrap">
              <div class="eyebrow">Desktop Console</div>
              <div class="title">Mercari 监控</div>
              <div class="subtitle">
                <span id="status" class="status-dot">连接中...</span>
                <span id="updated-inline">上次刷新 --</span>
              </div>
            </div>
          </div>

          <div class="actions">
            <button id="refresh" class="button ghost refresh-btn">刷新</button>
            <button id="run-once" class="button primary run-btn">立即抓取</button>
            <button id="toggle-mode" class="button toggle-btn" aria-label="切换视图" title="展开完整面板">精简</button>
          </div>
        </div>

        <div class="topbar-stats">
          <div class="stat-chip">
            <span class="stat-label">监控</span>
            <strong id="source-count">0</strong>
          </div>
          <div class="stat-chip">
            <span class="stat-label">启用中</span>
            <strong id="enabled-count">0</strong>
          </div>
          <div class="stat-chip">
            <span class="stat-label">最新商品</span>
            <strong id="item-count">0</strong>
          </div>
          <div class="stat-chip">
            <span class="stat-label">连续失败</span>
            <strong id="failure-count">0</strong>
          </div>
        </div>
      </header>

      <main class="panel-layout">
        <section class="panel-column panel-column--controls">
          <section class="surface compose-card">
            <div class="section-heading">
              <div>
                <div class="section-kicker">新增监控</div>
                <h2>把 web 端操作搬到这里</h2>
              </div>
              <div id="flash" class="flash" aria-live="polite"></div>
            </div>

            <div class="compose-grid">
              <label class="field">
                <span>名称</span>
                <input id="source-name" placeholder="例如：相机 / 耳机" />
              </label>
              <label class="field field-url">
                <span>Mercari 搜索链接</span>
                <input
                  id="source-url"
                  placeholder="https://jp.mercari.com/search?keyword=..."
                />
              </label>
              <button id="add-source" class="button primary add-btn">添加</button>
            </div>
            <p class="hint">
              仅支持 `mercari.com` 链接，添加后会继续按现有服务端策略抓取与推送。
            </p>
          </section>

          <section class="surface sources-card">
            <div class="section-heading">
              <div>
                <div class="section-kicker">监控列表</div>
                <h2>源管理</h2>
              </div>
            </div>
            <div id="sources" class="sources-list"></div>
          </section>
        </section>

        <section class="panel-column panel-column--feed">
          <section class="surface items-card">
            <div class="section-heading">
              <div>
                <div class="section-kicker">最新商品</div>
                <h2>实时上新流</h2>
              </div>
              <div class="legend">点击商品会复制链接并打开详情</div>
            </div>

            <div class="list list-panel" id="list"></div>
          </section>
        </section>
      </main>

      <footer class="footer">
        <span id="updated">--</span>
      </footer>
    </div>
  </body>
</html>
